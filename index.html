<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safy · Panel de Clones</title>
<link rel="icon" type="image/svg+xml" href="assets/logo.svg">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --red: #E40520;
    --red-dark: #B40418;
    --red-soft: #FCE6E9;
    --ink: #0F172A;
    --muted: #64748B;
    --line: #E2E8F0;
    --bg: #F8FAFC;
    --white: #FFFFFF;
    --green: #15803D;
    --green-bg: #F0FDF4;
    --gray: #94A3B8;
    --gray-bg: #F1F5F9;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 14px;
  }

  /* Header */
  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--white);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  header.top .logo { height: 56px; display: block; }
  header.top .actions { display: flex; gap: 8px; align-items: center; }

  button {
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--line);
    background: var(--white);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    transition: all .15s;
  }
  button:hover:not(:disabled) { background: var(--gray-bg); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.primary {
    background: var(--red);
    color: var(--white);
    border-color: var(--red);
  }
  button.primary:hover:not(:disabled) { background: var(--red-dark); border-color: var(--red-dark); }
  button.primary:disabled { background: var(--gray); border-color: var(--gray); }
  button.ghost { border-color: transparent; }

  /* Tabs row */
  nav.tabs-row {
    display: flex;
    gap: 4px;
    padding: 8px 24px 0;
    background: var(--white);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
    scrollbar-width: thin;
    position: sticky;
    top: 89px;
    z-index: 40;
  }
  nav.tabs-row .tab {
    padding: 10px 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-weight: 500;
    font-size: 14px;
    border-bottom: 3px solid transparent;
    border-radius: 0;
    margin-bottom: -1px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
  }
  nav.tabs-row .tab:hover { color: var(--ink); background: transparent; }
  nav.tabs-row .tab.active {
    color: var(--red);
    border-bottom-color: var(--red);
    font-weight: 600;
  }
  nav.tabs-row .tab.add-tab {
    color: var(--muted);
    font-style: italic;
    margin-left: 8px;
    padding-left: 12px;
    border-left: 1px solid var(--line);
  }
  nav.tabs-row .tab.add-tab:hover { color: var(--red); }

  /* Active clone header */
  .clone-header {
    padding: 16px 24px 0;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .clone-header .clone-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
  }
  .clone-header .clone-slug {
    font-size: 12px;
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    padding: 16px 24px 0;
  }
  .stat {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .stat .label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .5px;
    font-weight: 600;
  }
  .stat .value {
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
    color: var(--ink);
  }
  .stat .sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .stat.red .value { color: var(--red); }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    flex-wrap: wrap;
  }
  .search {
    flex: 1;
    min-width: 240px;
    max-width: 420px;
    position: relative;
  }
  .search input {
    width: 100%;
    padding: 9px 12px 9px 34px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: var(--white);
  }
  .search input:focus { outline: 2px solid var(--red); outline-offset: -1px; border-color: var(--red); }
  .search::before {
    content: '🔍';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    opacity: .5;
  }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    background: var(--red-soft);
    color: var(--red-dark);
    border: 1px solid var(--red);
    border-radius: 100px;
    padding: 4px 10px;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }
  .chip button {
    border: none;
    background: transparent;
    color: var(--red-dark);
    padding: 0;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
  }

  /* Table */
  .table-wrap {
    margin: 0 24px 24px;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: auto;
    max-height: calc(100vh - 360px);
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: var(--white);
    border-bottom: 2px solid var(--line);
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .3px;
    color: var(--muted);
    white-space: nowrap;
    z-index: 10;
  }
  thead th .th-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  thead th .th-inner:hover { color: var(--ink); }
  thead th .filter-btn {
    border: none;
    background: transparent;
    padding: 0 2px;
    color: var(--muted);
    cursor: pointer;
    font-size: 11px;
  }
  thead th .filter-btn.active { color: var(--red); }
  thead th .sort-ind { font-size: 10px; opacity: .6; }

  tbody td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  tbody tr:hover td { background: var(--bg); }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
  }
  .pill.yes { background: var(--green-bg); color: var(--green); }
  .pill.no  { background: var(--gray-bg); color: var(--gray); }
  .pill.os-ios { background: #EFF6FF; color: #1D4ED8; }
  .pill.os-android { background: #F0FDF4; color: #15803D; }
  .pill.os-other { background: var(--gray-bg); color: var(--muted); }
  .rating {
    display: inline-block;
    font-weight: 700;
    color: var(--red);
  }
  .empty-cell { color: var(--gray); font-style: italic; }

  /* Filter popover */
  .popover {
    position: absolute;
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 12px 40px rgba(0,0,0,.12);
    padding: 12px;
    min-width: 240px;
    z-index: 100;
  }
  .popover h4 {
    margin: 0 0 8px;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    font-weight: 600;
  }
  .popover label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 13px;
  }
  .popover input[type="checkbox"] { accent-color: var(--red); }
  .popover input[type="text"], .popover input[type="number"], .popover input[type="date"] {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    margin: 4px 0;
  }
  .popover .row { display: flex; gap: 6px; }
  .popover .actions {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }
  .popover .actions button { padding: 5px 10px; font-size: 12px; }
  .popover .opts-list { max-height: 220px; overflow-y: auto; }

  /* Modal */
  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal {
    background: var(--white);
    border-radius: 12px;
    max-width: 800px;
    width: 100%;
    max-height: 90vh;
    overflow: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .modal h2 {
    margin: 0;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    font-size: 18px;
  }
  .modal .body { padding: 20px 24px; }
  .modal .body input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .modal .body input[type="text"]:focus { outline: 2px solid var(--red); outline-offset: -1px; border-color: var(--red); }
  .modal .footer {
    padding: 14px 24px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .preview-table {
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: auto;
    max-height: 400px;
    margin-top: 12px;
  }
  .preview-table table { font-size: 12px; }
  .preview-table th { font-size: 10px; }
  .preview-table td { padding: 6px 10px; }
  .target-clone {
    background: var(--red-soft);
    color: var(--red-dark);
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .map-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .map-pill {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--gray-bg);
    color: var(--muted);
  }
  .map-pill.mapped { background: var(--green-bg); color: var(--green); border-color: var(--green); }
  .map-pill.unmapped { background: #FFFBEB; color: #B45309; border-color: #F59E0B; }
  .map-pill strong { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--white);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    animation: slideIn .2s ease-out;
  }
  .toast.error { background: var(--red); }
  .toast.success { background: #15803D; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-state h3 { color: var(--ink); margin: 0 0 8px; }

  .loading {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--line);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mobile */
  @media (max-width: 900px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    header.top { padding: 12px 16px; }
    header.top .logo { height: 44px; }
    .toolbar, .stats, .clone-header { padding-left: 16px; padding-right: 16px; }
    nav.tabs-row { padding-left: 16px; padding-right: 16px; }
    .table-wrap { margin: 0 16px 16px; }
  }
  @media (max-width: 540px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    header.top .logo { height: 36px; }
    .stat .value { font-size: 18px; }
  }
</style>
</head>
<body>

<header class="top">
  <img src="assets/logo.svg" alt="Safy · Panel de Clones" class="logo">
  <div class="actions">
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <button class="ghost" onclick="exportCsv()">Exportar CSV</button>
    <button class="primary" id="uploadBtn" onclick="document.getElementById('fileInput').click()">Subir Excel</button>
  </div>
</header>

<nav class="tabs-row" id="tabsRow"></nav>

<section class="clone-header" id="cloneHeader"></section>

<section class="stats" id="stats"></section>

<div class="toolbar">
  <div class="search">
    <input type="text" id="globalSearch" placeholder="Buscar nombre, email, teléfono…" oninput="onGlobalSearch(event)">
  </div>
  <div class="chips" id="filterChips"></div>
  <div style="margin-left:auto;color:var(--muted);font-size:12px;" id="rowCount"></div>
</div>

<div class="table-wrap" id="tableWrap"></div>

<div id="modalRoot"></div>
<div id="popoverRoot"></div>
<div id="toastRoot"></div>

<script>
//===============================================================
// Config
//===============================================================
const SB_URL = 'https://udlkorcjenhixpuseney.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbGtvcmNqZW5oaXhwdXNlbmV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzUyODAsImV4cCI6MjA4ODkxMTI4MH0.I7cTG9Tkn2RX5ledviEvfoH7Psw67DmfysfHu02oIXg';
const CLONES_TABLE = 'clones';
const USERS_TABLE = 'clone_users';
const SS_KEY = 'safy_panel_active_clone';

// Excel column letters (real positions, NOT the header text — see CLAUDE.md)
// Te acompaña fallback (Quadram export con desfase de 2 columnas, sin headers
// reconocibles para 'phone'). Se usa solo si la detección por cabeceras falla.
const TA_FALLBACK_MAP = {
  user_id:              'D',
  country_code:         'E',
  phone:                'F',
  brand:                'G',
  model:                'H',
  first_name:           'I',
  last_name:            'J',
  email:                'L',
  age:                  'M',
  registered_at:        'O',
  app_rating:           'Q',
  os:                   'R',
  has_alerts:           'Y',
  has_security_group:   'Z',
  used_acompana:        'AB',
  used_night_security:  'AC',
  app_installed:        'AE',
  has_widget:           'AF',
};

// Sinónimos de cabeceras (normalizados: solo a-z0-9). Cubre el formato Safy
// original, Te acompaña/Quadram, y formatos en español/inglés. Primer match
// gana, así que pongo los más específicos primero. Para añadir un formato
// nuevo basta con sumar sinónimos a la lista del campo correspondiente.
const FIELD_SYNONYMS = {
  user_id:              ['idusuario', 'userid', 'iduser'],
  country_code:         ['codigopais', 'codpais', 'countrycode'],
  phone:                ['telefono', 'phone', 'tel', 'movil'],
  brand:                ['marca', 'brand'],
  model:                ['modelo', 'model'],
  first_name:           ['nombre', 'firstname', 'name'],
  last_name:            ['apellidos', 'apellido', 'lastname', 'surname'],
  email:                ['email', 'correo', 'mail'],
  age:                  ['edad', 'age'],
  registered_at:        ['fecharegistro', 'fechacreacion', 'createdatdate', 'createdat', 'registrationdate'],
  app_rating:           ['apprating', 'valoracion', 'valoracionapp', 'rating'],
  os:                   ['sistemaoperativo', 'so', 'os'],
  has_alerts:           ['alertasemitidas', 'hasalerts', 'alertas'],
  has_security_group:   ['telefonosconfianza', 'hastrustedphones', 'gruposeguridad', 'gruposeguro'],
  used_acompana:        ['alertascentinela', 'centinelacount', 'centinela', 'usoacompana', 'acompana'],
  used_night_security:  ['alarmasnocturnas', 'nightalarmcount', 'segnocturna', 'seguridadnocturna'],
  app_installed:        ['appinstalada', 'appinstalled'],
  has_widget:           ['widgetactivo', 'activewidget', 'widget'],
};

const COLS = [
  { key: 'country_code',        label: 'Cód. País',     type: 'multi',     align: 'center' },
  { key: 'phone',               label: 'Teléfono',       type: 'text' },
  { key: 'os',                  label: 'SO',             type: 'multi',    align: 'center' },
  { key: 'brand',               label: 'Marca',          type: 'multi' },
  { key: 'first_name',          label: 'Nombre',         type: 'text' },
  { key: 'last_name',           label: 'Apellidos',      type: 'text' },
  { key: 'email',               label: 'Email',          type: 'text' },
  { key: 'age',                 label: 'Edad',           type: 'numrange', align: 'center' },
  { key: 'registered_at',       label: 'Fecha registro', type: 'daterange', align: 'center' },
  { key: 'app_rating',          label: 'Valoración',     type: 'numrange', align: 'center' },
  { key: 'has_alerts',          label: 'Alertas SOS',    type: 'bool',     align: 'center' },
  { key: 'has_security_group',  label: 'Grupo Seg.',     type: 'bool',     align: 'center' },
  { key: 'used_acompana',       label: 'Acompaña',       type: 'bool',     align: 'center' },
  { key: 'used_night_security', label: 'Seg. Nocturna',  type: 'bool',     align: 'center' },
  { key: 'app_installed',       label: 'Instalada',      type: 'bool',     align: 'center' },
  { key: 'has_widget',          label: 'Widget',         type: 'bool',     align: 'center' },
];

//===============================================================
// State
//===============================================================
const state = {
  clones: [],            // [{ slug, name, position, created_at }]
  activeClone: null,
  rows: [],              // users for activeClone
  filters: {},
  sort: { col: 'registered_at', dir: 'desc' },
  globalSearch: '',
  preview: null,
};

//===============================================================
// Supabase helper
//===============================================================
async function sb(path, opts = {}) {
  const { headers: extra, ...rest } = opts;
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(extra || {}),
    },
    ...rest,
  });
  const txt = await res.text();
  if (!res.ok) throw new Error(`Supabase ${res.status}: ${txt}`);
  return txt ? JSON.parse(txt) : null;
}

//===============================================================
// Loading
//===============================================================
async function loadClones() {
  state.clones = await sb(`${CLONES_TABLE}?select=*&order=position.asc.nullslast,name.asc`);
}

async function loadUsers() {
  if (!state.activeClone) { state.rows = []; return; }
  const slug = encodeURIComponent(state.activeClone);
  const rows = [];
  let offset = 0;
  const limit = 1000;
  while (true) {
    const page = await sb(`${USERS_TABLE}?select=*&clone_slug=eq.${slug}&order=registered_at.desc.nullslast&limit=${limit}&offset=${offset}`);
    rows.push(...page);
    if (page.length < limit) break;
    offset += limit;
  }
  state.rows = rows;
}

function getActiveClone() {
  return state.clones.find(c => c.slug === state.activeClone) || null;
}

async function switchClone(slug) {
  if (slug === state.activeClone) return;
  state.activeClone = slug;
  state.filters = {};
  state.globalSearch = '';
  const gs = document.getElementById('globalSearch');
  if (gs) gs.value = '';
  sessionStorage.setItem(SS_KEY, slug || '');
  state.rows = [];
  render();                  // immediate UI feedback
  try {
    await loadUsers();
  } catch (err) {
    console.error(err);
    toast(err.message || 'Error cargando datos del clon', 'error');
  }
  render();
}

//===============================================================
// Add clone
//===============================================================
function slugify(s) {
  return String(s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/ñ/g, 'n')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .slice(0, 60);
}

function openAddCloneModal() {
  const html = `
    <div class="backdrop" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:480px">
        <h2>Añadir clon</h2>
        <div class="body">
          <label style="display:block;margin-bottom:6px;font-weight:500;">Nombre del clon</label>
          <input type="text" id="newCloneName" placeholder="Ej. Mi Nuevo Clon" autofocus
                 oninput="document.getElementById('newCloneSlug').textContent = slugify(this.value) || '—'"
                 onkeydown="if(event.key==='Enter') confirmAddClone()">
          <p style="margin-top:12px;font-size:12px;color:var(--muted);">
            Slug interno: <code id="newCloneSlug" style="background:var(--gray-bg);padding:2px 6px;border-radius:4px;">—</code>
          </p>
          <p style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5;">
            Se creará una pestaña nueva vacía. Podrás subir el Excel del clon
            inmediatamente después y los datos quedarán aislados de los otros clones.
          </p>
        </div>
        <div class="footer">
          <button onclick="closeModal()">Cancelar</button>
          <button class="primary" onclick="confirmAddClone()">Crear clon</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modalRoot').innerHTML = html;
  setTimeout(() => document.getElementById('newCloneName')?.focus(), 50);
}

async function confirmAddClone() {
  const name = (document.getElementById('newCloneName')?.value || '').trim();
  if (!name) { toast('Pon un nombre para el clon', 'error'); return; }
  const slug = slugify(name);
  if (!slug) { toast('Ese nombre no genera un slug válido', 'error'); return; }
  if (state.clones.some(c => c.slug === slug)) {
    toast(`Ya existe un clon con slug "${slug}". Prueba otro nombre.`, 'error');
    return;
  }
  try {
    const maxPos = state.clones.reduce((m, c) => Math.max(m, c.position || 0), 0);
    await sb(CLONES_TABLE, {
      method: 'POST',
      headers: { 'Prefer': 'return=minimal' },
      body: JSON.stringify({ slug, name, position: maxPos + 1 }),
    });
    closeModal();
    toast(`Clon "${name}" creado.`, 'success');
    await loadClones();
    await switchClone(slug);
  } catch (err) {
    console.error(err);
    toast(err.message || 'Error creando clon', 'error');
  }
}

//===============================================================
// Excel parsing
//===============================================================
function cellText(ws, addr) {
  const c = ws[addr];
  if (!c) return '';
  if (c.w !== undefined) return String(c.w).trim();
  if (c.v !== undefined) return String(c.v).trim();
  return '';
}
function cellNum(ws, addr) {
  const c = ws[addr];
  if (!c || c.v === undefined || c.v === '') return null;
  const n = Number(c.v);
  return Number.isFinite(n) ? n : null;
}
function cellBool(ws, addr) {
  const t = cellText(ws, addr).toLowerCase();
  if (!t) return false;
  return t === '1' || t === 'true' || t === 'sí' || t === 'si' || t === 'yes' || t === 'y';
}
function cellDateISO(ws, addr) {
  const c = ws[addr];
  if (!c) return null;
  if (c.w) {
    const m = String(c.w).match(/(\d{4})-(\d{2})-(\d{2})/);
    if (m) return `${m[1]}-${m[2]}-${m[3]}`;
    const m2 = String(c.w).match(/(\d{2})\/(\d{2})\/(\d{4})/);
    if (m2) return `${m2[3]}-${m2[2]}-${m2[1]}`;
  }
  if (typeof c.v === 'number') {
    const d = XLSX.SSF.parse_date_code(c.v);
    if (d) return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
  }
  if (typeof c.v === 'string') {
    const m = c.v.match(/(\d{4})-(\d{2})-(\d{2})/);
    if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  }
  return null;
}

// Normaliza un header para buscar en FIELD_SYNONYMS: minúsculas, NFD,
// strip diacríticos y deja solo a-z0-9. "Codigo_Pais" → "codigopais",
// "Teléfono" → "telefono", "App Rating" → "apprating".
function normalizeHeader(s) {
  return String(s || '')
    .toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/ñ/g, 'n')
    .replace(/[^a-z0-9]/g, '');
}

// Lee la cabecera (primera fila del rango) y devuelve un mapa
// {field → letraColumna}. Si no encuentra un campo, simplemente no
// aparece en el resultado.
function detectColumnMap(ws, range) {
  const headers = {};            // letter → normalized header text
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cellRef = XLSX.utils.encode_cell({ r: range.s.r, c });
    const letter = XLSX.utils.encode_col(c);
    const txt = cellText(ws, cellRef);
    if (txt) headers[letter] = normalizeHeader(txt);
  }
  const map = {};
  for (const [field, syns] of Object.entries(FIELD_SYNONYMS)) {
    for (const [letter, h] of Object.entries(headers)) {
      if (syns.includes(h)) { map[field] = letter; break; }
    }
  }
  return { headers, map };
}

function parseExcel(buf) {
  const wb = XLSX.read(buf, { type: 'array', cellDates: false });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const ref = ws['!ref'];
  if (!ref) throw new Error('La hoja está vacía');
  const range = XLSX.utils.decode_range(ref);

  // Estrategia 1: detectar columnas por sinónimos de cabecera (Safy, futuros formatos).
  let { headers, map } = detectColumnMap(ws, range);

  // Estrategia 2 (fallback Te acompaña): si no hay 'phone' detectado, probamos
  // si la columna F del segundo registro parece un teléfono y, en ese caso,
  // asumimos el mapping hardcodeado del export de Quadram.
  if (!map.phone) {
    let teAcompanaLikely = false;
    for (let r = range.s.r + 2; r <= Math.min(range.s.r + 10, range.e.r + 1); r++) {
      const f = cellText(ws, 'F' + r);
      const e = cellText(ws, 'E' + r);
      if (/^\d{6,15}$/.test(f) && /^\d{1,4}$/.test(e)) { teAcompanaLikely = true; break; }
    }
    if (teAcompanaLikely) {
      map = { ...TA_FALLBACK_MAP };
    }
  }

  if (!map.phone) {
    const sample = Object.entries(headers).slice(0, 8).map(([l,h]) => `${l}=${h}`).join(', ');
    throw new Error(`No se ha encontrado columna de teléfono en el Excel. Cabeceras detectadas: ${sample || '(vacías)'}…`);
  }

  // Iterar filas. La cabecera es range.s.r (fila 1 del rango).
  // Deduplicamos por teléfono mientras leemos: si un teléfono aparece dos
  // veces en el Excel, nos quedamos con la última ocurrencia. Esto es
  // imprescindible porque PostgREST no permite que un mismo `ON CONFLICT`
  // afecte a la misma fila destino dos veces dentro del mismo batch.
  const byPhone = new Map();
  let totalWithPhone = 0;
  for (let r = range.s.r + 1; r <= range.e.r; r++) {
    const at = (col) => col ? col + (r + 1) : null;
    const phone = cellText(ws, at(map.phone));
    if (!phone) continue;
    totalWithPhone++;

    // Para los contadores (Acompaña, Seg. Nocturna), >0 → true.
    const acompanaRaw = map.used_acompana ? cellNum(ws, at(map.used_acompana)) : null;
    const nightRaw    = map.used_night_security ? cellNum(ws, at(map.used_night_security)) : null;

    byPhone.set(phone, {
      user_id:              map.user_id        ? (cellText(ws, at(map.user_id)) || null) : null,
      country_code:         map.country_code   ? (cellText(ws, at(map.country_code)) || null) : null,
      phone:                phone,
      brand:                map.brand          ? (cellText(ws, at(map.brand)) || null) : null,
      model:                map.model          ? (cellText(ws, at(map.model)) || null) : null,
      first_name:           map.first_name     ? (cellText(ws, at(map.first_name)) || null) : null,
      last_name:            map.last_name      ? (cellText(ws, at(map.last_name)) || null) : null,
      email:                map.email          ? (cellText(ws, at(map.email)) || null) : null,
      age:                  map.age            ? cellNum(ws, at(map.age)) : null,
      registered_at:        map.registered_at  ? cellDateISO(ws, at(map.registered_at)) : null,
      app_rating:           map.app_rating     ? cellNum(ws, at(map.app_rating)) : null,
      os:                   map.os             ? (cellText(ws, at(map.os)) || null) : null,
      has_alerts:           map.has_alerts          ? cellBool(ws, at(map.has_alerts)) : false,
      has_security_group:   map.has_security_group  ? cellBool(ws, at(map.has_security_group)) : false,
      used_acompana:        (acompanaRaw || 0) > 0,
      used_night_security:  (nightRaw    || 0) > 0,
      app_installed:        map.app_installed  ? cellBool(ws, at(map.app_installed)) : false,
      has_widget:           map.has_widget     ? cellBool(ws, at(map.has_widget)) : false,
    });
  }
  const rows = Array.from(byPhone.values());
  // Adjunta metadatos al array para mostrarlos en el preview y para debugging.
  rows.detectedMap = map;
  rows.duplicatesRemoved = totalWithPhone - rows.length;
  return rows;
}

//===============================================================
// Upload flow
//===============================================================
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  if (!state.activeClone) {
    toast('Selecciona o crea un clon antes de subir un Excel', 'error');
    return;
  }
  try {
    const buf = await file.arrayBuffer();
    const rows = parseExcel(buf);
    if (!rows.length) {
      toast('No se han encontrado filas con teléfono en el Excel.', 'error');
      return;
    }
    state.preview = { rows, filename: file.name, targetClone: state.activeClone };
    renderPreviewModal();
  } catch (err) {
    console.error(err);
    toast(err.message || 'Error parseando el Excel', 'error');
  }
});

async function confirmUpload() {
  const { rows, targetClone } = state.preview;
  state.preview = null;
  closeModal();
  // Tag every row with the clone slug it belongs to
  const tagged = rows.map(r => ({ ...r, clone_slug: targetClone }));
  const total = tagged.length;
  let done = 0;
  showProgressToast(`Subiendo 0 / ${total}…`);
  try {
    const batchSize = 500;
    for (let i = 0; i < tagged.length; i += batchSize) {
      const batch = tagged.slice(i, i + batchSize);
      await sb(USERS_TABLE + '?on_conflict=clone_slug,phone', {
        method: 'POST',
        headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(batch),
      });
      done += batch.length;
      updateProgressToast(`Subiendo ${done} / ${total}…`);
    }
    hideProgressToast();
    const cloneName = state.clones.find(c => c.slug === targetClone)?.name || targetClone;
    toast(`Cargados ${total} usuarios en "${cloneName}".`, 'success');
    if (state.activeClone === targetClone) {
      await loadUsers();
      render();
    }
  } catch (err) {
    hideProgressToast();
    console.error(err);
    toast(err.message || 'Error subiendo a Supabase', 'error');
  }
}

//===============================================================
// Filtering
//===============================================================
function passesFilters(row) {
  if (state.globalSearch) {
    const q = state.globalSearch.toLowerCase();
    const hay = [row.first_name, row.last_name, row.email, row.phone, row.brand, row.model]
      .filter(Boolean).map(s => String(s).toLowerCase()).join(' ');
    if (!hay.includes(q)) return false;
  }
  for (const [key, f] of Object.entries(state.filters)) {
    if (f == null) continue;
    const col = COLS.find(c => c.key === key);
    if (!col) continue;
    const v = row[key];
    if (col.type === 'multi') {
      const repr = v == null || v === '' ? '' : String(v);
      if (!f.includes(repr)) return false;
    } else if (col.type === 'text') {
      const q = String(f).toLowerCase();
      if (!q) continue;
      if (!String(v || '').toLowerCase().includes(q)) return false;
    } else if (col.type === 'numrange') {
      const num = v == null ? null : Number(v);
      if (f.min != null && (num == null || num < f.min)) return false;
      if (f.max != null && (num == null || num > f.max)) return false;
    } else if (col.type === 'daterange') {
      const d = v || '';
      if (f.from && (!d || d < f.from)) return false;
      if (f.to && (!d || d > f.to)) return false;
    } else if (col.type === 'bool') {
      const truthy = !!v;
      if (f === 'yes' && !truthy) return false;
      if (f === 'no' && truthy) return false;
    }
  }
  return true;
}

function getFilteredSorted() {
  let r = state.rows.filter(passesFilters);
  const { col, dir } = state.sort;
  const m = dir === 'asc' ? 1 : -1;
  r = r.slice().sort((a, b) => {
    const av = a[col]; const bv = b[col];
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * m;
    return String(av).localeCompare(String(bv)) * m;
  });
  return r;
}

//===============================================================
// Render
//===============================================================
function render() {
  renderTabs();
  renderCloneHeader();
  renderStats();
  renderChips();
  renderTable();
  renderRowCount();
  updateUploadBtnState();
}

function renderTabs() {
  const html = state.clones.map(c => `
    <button class="tab ${c.slug === state.activeClone ? 'active' : ''}"
            onclick="switchClone('${escapeAttr(c.slug)}')">
      ${escapeHtml(c.name)}
    </button>
  `).join('') + `<button class="tab add-tab" onclick="openAddCloneModal()">+ Añadir clon</button>`;
  document.getElementById('tabsRow').innerHTML = html;
}

function renderCloneHeader() {
  const c = getActiveClone();
  const el = document.getElementById('cloneHeader');
  if (!c) {
    el.innerHTML = `<div class="clone-name" style="color:var(--muted);">Crea el primer clon para empezar →</div>`;
    return;
  }
  el.innerHTML = `
    <div class="clone-name">${escapeHtml(c.name)}</div>
    <div class="clone-slug">${escapeHtml(c.slug)}</div>
  `;
}

function renderStats() {
  const all = state.rows;
  const t = all.length;
  const ios = all.filter(r => r.os === 'iOS').length;
  const android = all.filter(r => r.os === 'Android').length;
  const installed = all.filter(r => r.app_installed).length;
  const widget = all.filter(r => r.has_widget).length;
  const grupo = all.filter(r => r.has_security_group).length;
  const pct = (n) => t ? Math.round(n * 100 / t) + '%' : '—';
  document.getElementById('stats').innerHTML = `
    <div class="stat red"><div class="label">Usuarios</div><div class="value">${t}</div><div class="sub">en este clon</div></div>
    <div class="stat"><div class="label">iOS</div><div class="value">${ios}</div><div class="sub">${pct(ios)}</div></div>
    <div class="stat"><div class="label">Android</div><div class="value">${android}</div><div class="sub">${pct(android)}</div></div>
    <div class="stat"><div class="label">App instalada</div><div class="value">${installed}</div><div class="sub">${pct(installed)}</div></div>
    <div class="stat"><div class="label">Widget</div><div class="value">${widget}</div><div class="sub">${pct(widget)}</div></div>
    <div class="stat"><div class="label">Grupo de seguridad</div><div class="value">${grupo}</div><div class="sub">${pct(grupo)}</div></div>
  `;
}

function renderChips() {
  const wrap = document.getElementById('filterChips');
  const chips = [];
  if (state.globalSearch) {
    chips.push(`<span class="chip">Buscar: "${escapeHtml(state.globalSearch)}" <button onclick="clearGlobalSearch()">×</button></span>`);
  }
  for (const [key, f] of Object.entries(state.filters)) {
    if (f == null) continue;
    const col = COLS.find(c => c.key === key);
    if (!col) continue;
    let val = '';
    if (col.type === 'multi') val = (f.length === 0) ? 'ninguno' : (f.length <= 3 ? f.map(x => x || '∅').join(', ') : `${f.length} valores`);
    else if (col.type === 'text') val = `"${f}"`;
    else if (col.type === 'numrange') val = `${f.min ?? '−∞'} ≤ x ≤ ${f.max ?? '∞'}`;
    else if (col.type === 'daterange') val = `${f.from || ''} → ${f.to || ''}`;
    else if (col.type === 'bool') val = f === 'yes' ? 'Sí' : 'No';
    chips.push(`<span class="chip">${col.label}: ${escapeHtml(val)} <button onclick="clearFilter('${key}')">×</button></span>`);
  }
  wrap.innerHTML = chips.join('');
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  if (!state.activeClone) {
    wrap.innerHTML = `
      <div class="empty-state">
        <h3>Sin clon seleccionado</h3>
        <p>Pulsa "+ Añadir clon" para crear el primero.</p>
      </div>`;
    return;
  }
  if (!state.rows.length) {
    const c = getActiveClone();
    wrap.innerHTML = `
      <div class="empty-state">
        <h3>"${escapeHtml(c?.name || '')}" no tiene datos todavía</h3>
        <p>Pulsa <strong>Subir Excel</strong> arriba a la derecha para cargar usuarios en este clon.</p>
      </div>`;
    return;
  }
  const filtered = getFilteredSorted();
  const head = COLS.map(c => {
    const active = state.filters[c.key] != null ? 'active' : '';
    const sortInd = state.sort.col === c.key ? (state.sort.dir === 'asc' ? '▲' : '▼') : '';
    return `
      <th style="text-align:${c.align||'left'}">
        <span class="th-inner" onclick="onSortClick('${c.key}', event)">
          ${c.label} <span class="sort-ind">${sortInd}</span>
        </span>
        <button class="filter-btn ${active}" title="Filtrar" onclick="openFilter('${c.key}', event)">▾</button>
      </th>`;
  }).join('');
  const body = filtered.map(r => `
    <tr>
      ${COLS.map(c => `<td style="text-align:${c.align||'left'}">${renderCell(r, c)}</td>`).join('')}
    </tr>
  `).join('');
  wrap.innerHTML = `
    <table>
      <thead><tr>${head}</tr></thead>
      <tbody>${body}</tbody>
    </table>
  `;
}

function renderCell(row, col) {
  const v = row[col.key];
  if (col.type === 'bool') {
    return v ? '<span class="pill yes">Sí</span>' : '<span class="pill no">No</span>';
  }
  if (col.key === 'os') {
    const cls = v === 'iOS' ? 'os-ios' : v === 'Android' ? 'os-android' : 'os-other';
    return `<span class="pill ${cls}">${escapeHtml(v || '—')}</span>`;
  }
  if (col.key === 'app_rating') {
    return v == null ? '<span class="empty-cell">—</span>' : `<span class="rating">${v}</span>`;
  }
  if (v == null || v === '') return '<span class="empty-cell">—</span>';
  return escapeHtml(String(v));
}

function renderRowCount() {
  const el = document.getElementById('rowCount');
  if (!state.activeClone) { el.textContent = ''; return; }
  const total = state.rows.length;
  const filtered = getFilteredSorted().length;
  el.textContent = filtered === total ? `${total} usuarios` : `${filtered} de ${total} usuarios`;
}

function updateUploadBtnState() {
  const btn = document.getElementById('uploadBtn');
  const c = getActiveClone();
  if (c) {
    btn.disabled = false;
    btn.title = `Subir Excel a "${c.name}"`;
    btn.textContent = 'Subir Excel';
  } else {
    btn.disabled = true;
    btn.title = 'Crea o selecciona un clon primero';
    btn.textContent = 'Subir Excel';
  }
}

//===============================================================
// Filter popover
//===============================================================
function openFilter(key, event) {
  event.stopPropagation();
  const col = COLS.find(c => c.key === key);
  const btn = event.currentTarget;
  const r = btn.getBoundingClientRect();
  const top = r.bottom + window.scrollY + 4;
  const left = Math.min(r.left + window.scrollX, window.innerWidth - 260);

  let body = '';
  const cur = state.filters[key];
  if (col.type === 'text') {
    body = `<input type="text" id="popInput" placeholder="Contiene…" value="${escapeAttr(cur || '')}">`;
  } else if (col.type === 'multi') {
    const values = uniqueValues(key);
    const sel = cur ? new Set(cur) : new Set(values);
    body = `
      <div class="opts-list">
        ${values.map(v => `
          <label><input type="checkbox" value="${escapeAttr(v)}" ${sel.has(v) ? 'checked' : ''}> ${escapeHtml(v || '(vacío)')}</label>
        `).join('')}
      </div>
      <div style="display:flex;gap:6px;margin-top:6px;">
        <button onclick="popMultiAll(true)">Todos</button>
        <button onclick="popMultiAll(false)">Ninguno</button>
      </div>`;
  } else if (col.type === 'numrange') {
    body = `
      <div class="row">
        <input type="number" id="popMin" placeholder="Mín" value="${cur && cur.min != null ? cur.min : ''}">
        <input type="number" id="popMax" placeholder="Máx" value="${cur && cur.max != null ? cur.max : ''}">
      </div>`;
  } else if (col.type === 'daterange') {
    body = `
      <div class="row">
        <input type="date" id="popFrom" value="${(cur && cur.from) || ''}">
        <input type="date" id="popTo" value="${(cur && cur.to) || ''}">
      </div>`;
  } else if (col.type === 'bool') {
    body = `
      <label><input type="radio" name="boolFilter" value="all" ${!cur ? 'checked' : ''}> Todos</label>
      <label><input type="radio" name="boolFilter" value="yes" ${cur === 'yes' ? 'checked' : ''}> Sí</label>
      <label><input type="radio" name="boolFilter" value="no" ${cur === 'no' ? 'checked' : ''}> No</label>`;
  }

  const html = `
    <div class="popover" style="top:${top}px; left:${left}px;" onclick="event.stopPropagation()">
      <h4>${col.label}</h4>
      ${body}
      <div class="actions">
        <button onclick="clearFilter('${key}'); closePopover();">Limpiar</button>
        <button class="primary" onclick="applyFilter('${key}', '${col.type}')">Aplicar</button>
      </div>
    </div>`;
  document.getElementById('popoverRoot').innerHTML = html;
  setTimeout(() => {
    const inp = document.getElementById('popInput');
    if (inp) inp.focus();
  }, 50);
}

function popMultiAll(all) {
  const cbs = document.querySelectorAll('#popoverRoot .opts-list input[type=checkbox]');
  cbs.forEach(c => c.checked = all);
}

function applyFilter(key, type) {
  if (type === 'text') {
    const v = document.getElementById('popInput').value.trim();
    state.filters[key] = v || null;
  } else if (type === 'multi') {
    const cbs = document.querySelectorAll('#popoverRoot .opts-list input[type=checkbox]');
    const sel = Array.from(cbs).filter(c => c.checked).map(c => c.value);
    const all = uniqueValues(key);
    state.filters[key] = (sel.length === all.length) ? null : sel;
  } else if (type === 'numrange') {
    const minV = document.getElementById('popMin').value;
    const maxV = document.getElementById('popMax').value;
    if (!minV && !maxV) state.filters[key] = null;
    else state.filters[key] = { min: minV ? Number(minV) : null, max: maxV ? Number(maxV) : null };
  } else if (type === 'daterange') {
    const from = document.getElementById('popFrom').value;
    const to = document.getElementById('popTo').value;
    if (!from && !to) state.filters[key] = null;
    else state.filters[key] = { from: from || null, to: to || null };
  } else if (type === 'bool') {
    const v = document.querySelector('#popoverRoot input[name=boolFilter]:checked').value;
    state.filters[key] = (v === 'all') ? null : v;
  }
  closePopover();
  render();
}

function clearFilter(key) {
  delete state.filters[key];
  render();
}

function closePopover() {
  document.getElementById('popoverRoot').innerHTML = '';
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.popover') && !e.target.closest('.filter-btn')) closePopover();
});

function uniqueValues(key) {
  const set = new Set();
  for (const r of state.rows) {
    set.add(r[key] == null || r[key] === '' ? '' : String(r[key]));
  }
  return Array.from(set).sort((a, b) => a.localeCompare(b));
}

//===============================================================
// Sort + global search
//===============================================================
function onSortClick(key) {
  if (state.sort.col === key) {
    state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    state.sort = { col: key, dir: 'asc' };
  }
  render();
}
function onGlobalSearch(e) {
  state.globalSearch = e.target.value.trim();
  render();
}
function clearGlobalSearch() {
  state.globalSearch = '';
  document.getElementById('globalSearch').value = '';
  render();
}

//===============================================================
// CSV export
//===============================================================
function exportCsv() {
  const rows = getFilteredSorted();
  if (!rows.length) { toast('No hay filas para exportar', 'error'); return; }
  const headers = COLS.map(c => c.label);
  const lines = [headers.join(';')];
  for (const r of rows) {
    const cells = COLS.map(c => {
      let v = r[c.key];
      if (c.type === 'bool') v = v ? 'Sí' : 'No';
      if (v == null) v = '';
      v = String(v).replace(/"/g, '""');
      if (/[;"\n]/.test(v)) v = `"${v}"`;
      return v;
    });
    lines.push(cells.join(';'));
  }
  const csv = '﻿' + lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  const cloneSlug = state.activeClone || 'sin-clon';
  a.href = url;
  a.download = `${cloneSlug}-usuarios-${today}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

//===============================================================
// Modal (preview upload)
//===============================================================
function renderPreviewModal() {
  const { rows, filename, targetClone } = state.preview;
  const cloneName = state.clones.find(c => c.slug === targetClone)?.name || targetClone;
  const sample = rows.slice(0, 10);
  const cols = ['phone', 'first_name', 'last_name', 'email', 'os', 'brand', 'registered_at'];
  const map = rows.detectedMap || {};
  const mapEntries = [
    ['phone',              'Teléfono'],
    ['country_code',       'Cód. País'],
    ['first_name',         'Nombre'],
    ['last_name',          'Apellidos'],
    ['email',              'Email'],
    ['age',                'Edad'],
    ['os',                 'SO'],
    ['brand',              'Marca'],
    ['registered_at',      'F. registro'],
    ['app_rating',         'Valoración'],
    ['has_alerts',         'Alertas'],
    ['has_security_group', 'Grupo seg.'],
    ['used_acompana',      'Acompaña'],
    ['used_night_security','Seg. noct.'],
    ['app_installed',      'Instalada'],
    ['has_widget',         'Widget'],
  ];
  const mapHtml = mapEntries.map(([f, l]) => {
    const letter = map[f];
    const cls = letter ? 'mapped' : 'unmapped';
    return `<span class="map-pill ${cls}">${l}: <strong>${letter || '—'}</strong></span>`;
  }).join('');

  const html = `
    <div class="backdrop" onclick="if(event.target===this)cancelUpload()">
      <div class="modal">
        <h2>Confirmar subida · ${escapeHtml(filename)}</h2>
        <div class="body">
          <div class="target-clone">
            Los datos se cargarán en el clon <strong>${escapeHtml(cloneName)}</strong>. Los demás clones no se ven afectados.
          </div>
          <p>Se han detectado <strong>${rows.length}</strong> usuarios únicos en el Excel${rows.duplicatesRemoved ? ` (deduplicados ${rows.duplicatesRemoved} teléfonos repetidos: se ha quedado la última ocurrencia)` : ''}. Upsert por (clon + teléfono): los existentes se actualizan, los nuevos se insertan.</p>
          <details style="margin-top:8px;margin-bottom:12px;">
            <summary style="cursor:pointer;font-size:12px;color:var(--muted);">Mapeo de columnas detectado (${Object.keys(map).length} de ${mapEntries.length} campos)</summary>
            <div class="map-pills">${mapHtml}</div>
          </details>
          <div class="preview-table">
            <table>
              <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
              <tbody>
                ${sample.map(r => `<tr>${cols.map(c => `<td>${escapeHtml(r[c] ?? '')}</td>`).join('')}</tr>`).join('')}
              </tbody>
            </table>
          </div>
          <p style="font-size:12px;color:var(--muted);margin-top:8px;">Mostrando ${sample.length} de ${rows.length} filas. La subida puede tardar ~1 min para volúmenes grandes (50k+).</p>
        </div>
        <div class="footer">
          <button onclick="cancelUpload()">Cancelar</button>
          <button class="primary" onclick="confirmUpload()">Subir a "${escapeHtml(cloneName)}"</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modalRoot').innerHTML = html;
}
function cancelUpload() {
  state.preview = null;
  closeModal();
}
function closeModal() {
  document.getElementById('modalRoot').innerHTML = '';
}

//===============================================================
// Toast
//===============================================================
function toast(msg, type = '') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.getElementById('toastRoot').appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
let progressToastEl = null;
function showProgressToast(msg) {
  hideProgressToast();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span class="loading"></span><span class="msg">${escapeHtml(msg)}</span>`;
  progressToastEl = t;
  document.getElementById('toastRoot').appendChild(t);
}
function updateProgressToast(msg) {
  if (!progressToastEl) return;
  progressToastEl.querySelector('.msg').textContent = msg;
}
function hideProgressToast() {
  if (progressToastEl) { progressToastEl.remove(); progressToastEl = null; }
}

//===============================================================
// Util
//===============================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}
function escapeAttr(s) { return escapeHtml(s); }

//===============================================================
// Boot
//===============================================================
(async () => {
  try {
    await loadClones();
    const remembered = sessionStorage.getItem(SS_KEY);
    state.activeClone = (remembered && state.clones.find(c => c.slug === remembered)?.slug)
      || state.clones[0]?.slug
      || null;
    if (state.activeClone) await loadUsers();
  } catch (err) {
    console.error(err);
    toast('No se pudo cargar la base de datos: ' + err.message, 'error');
  }
  render();
})();
</script>
